<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="sky1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#10477f"/>
      <stop offset="100%" stop-color="#0a2847"/>
    </linearGradient>
    <linearGradient id="flame1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFE873"/>
      <stop offset="100%" stop-color="#F2994A"/>
    </linearGradient>
  </defs>
  <rect width="400" height="400" fill="url(#sky1)"/>
  <!-- mountains -->
  <path d="M0,400 L0,300 L60,230 L110,280 L170,180 L230,260 L290,200 L340,250 L400,210 L400,400 Z" fill="#0c3560" opacity="0.7"/>
  <path d="M0,400 L0,340 L80,290 L150,330 L220,260 L290,320 L360,270 L400,300 L400,400 Z" fill="#081d33" opacity="0.8"/>
  <!-- track lines -->
  <g stroke="#FFFFFF" stroke-opacity="0.18" stroke-width="3">
    <line x1="0" y1="400" x2="400" y2="400"/>
    <line x1="0" y1="385" x2="400" y2="385"/>
    <line x1="0" y1="370" x2="400" y2="370"/>
    <line x1="0" y1="355" x2="400" y2="355"/>
  </g>
  <!-- runners silhouette -->
  <g fill="#FFD23F">
    <g transform="translate(90,330) scale(0.55)">
      <ellipse cx="20" cy="8" rx="9" ry="9"/>
      <path d="M10,20 Q5,40 -5,55 L5,60 Q15,42 22,28 Q32,40 35,60 L46,57 Q42,35 30,18 Q22,8 10,20Z"/>
    </g>
    <g transform="translate(150,335) scale(0.5)" fill="#FFFFFF" opacity="0.92">
      <ellipse cx="20" cy="8" rx="9" ry="9"/>
      <path d="M10,20 Q5,40 -5,55 L5,60 Q15,42 22,28 Q32,40 35,60 L46,57 Q42,35 30,18 Q22,8 10,20Z"/>
    </g>
    <g transform="translate(210,330) scale(0.55)">
      <ellipse cx="20" cy="8" rx="9" ry="9"/>
      <path d="M10,20 Q5,40 -5,55 L5,60 Q15,42 22,28 Q32,40 35,60 L46,57 Q42,35 30,18 Q22,8 10,20Z"/>
    </g>
    <g transform="translate(270,338) scale(0.45)" fill="#FFFFFF" opacity="0.8">
      <ellipse cx="20" cy="8" rx="9" ry="9"/>
      <path d="M10,20 Q5,40 -5,55 L5,60 Q15,42 22,28 Q32,40 35,60 L46,57 Q42,35 30,18 Q22,8 10,20Z"/>
    </g>
  </g>
  <!-- sun/flame accent top right -->
  <circle cx="340" cy="70" r="34" fill="url(#flame1)" opacity="0.9"/>
</svg>
